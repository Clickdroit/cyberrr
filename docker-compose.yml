version: "3.9"

# ═══════════════════════════════════════════════════════════
#  OSINT Hub — Docker Compose
#  Services: backend (FastAPI), worker (Celery), redis, frontend (Nginx)
# ═══════════════════════════════════════════════════════════

networks:
  osint_network:
    driver: bridge

volumes:
  osint_data:      # SQLite DB + reports
    driver: local
  redis_data:
    driver: local

services:

  # ── Redis — Message broker & result backend ─────────────
  redis:
    image: redis:7-alpine
    container_name: osint_redis
    restart: unless-stopped
    command: >
      redis-server
      --save 60 1
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - osint_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: osint_backend
    restart: unless-stopped
    environment:
      - ACCESS_PASSWORD=${ACCESS_PASSWORD:-osint_changeme}
      - SECRET_KEY=${SECRET_KEY:-changeme_32chars_random_secret_key}
      - REDIS_URL=redis://redis:6379/0
      - DB_PATH=/data/db/osint.db
      - REPORTS_DIR=/data/reports
      - FRONTEND_DIR=/app/frontend
      - GHUNT_COOKIES_PATH=/app/config/ghunt_cookies.json
      - HTTPS_ENABLED=${HTTPS_ENABLED:-false}
    volumes:
      - osint_data:/data
      - ./frontend:/app/frontend:ro   # Serve frontend in dev mode
      - ./config:/app/config          # GHunt cookies & config
    networks:
      - osint_network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Celery Worker ────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: osint_worker
    restart: unless-stopped
    command: >
      celery -A app.celery_app worker
      --loglevel=info
      --concurrency=2
      --queues=default,username_queue,email_queue
      --max-tasks-per-child=10
    environment:
      - ACCESS_PASSWORD=${ACCESS_PASSWORD:-osint_changeme}
      - SECRET_KEY=${SECRET_KEY:-changeme_32chars_random_secret_key}
      - REDIS_URL=redis://redis:6379/0
      - DB_PATH=/data/db/osint.db
      - REPORTS_DIR=/data/reports
      - GHUNT_COOKIES_PATH=/app/config/ghunt_cookies.json
    volumes:
      - osint_data:/data
      - ./config:/app/config
    networks:
      - osint_network
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  # ── Nginx — Frontend + Reverse Proxy ────────────────────
  frontend:
    image: nginx:1.25-alpine
    container_name: osint_frontend
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    networks:
      - osint_network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 20s
      timeout: 10s
      retries: 3
